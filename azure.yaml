# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: foundry-agents-101
metadata:
  template: foundry-agents-101
services:
  backend:
    project: src/app/backend
    language: py
    host: appservice
hooks:
  preprovision:
    posix:
      shell: sh
      run: ./infra/hooks/preprovision.sh
      interactive: true
    windows:
      shell: pwsh
      run: ./infra/hooks/preprovision.ps1
      interactive: true
  predeploy:
    posix:
      shell: sh
      run: |
        cd src/app/frontend
        npm install
        npm run build
        rm -rf ../backend/static
        cp -r dist ../backend/static
    windows:
      shell: pwsh
      run: |
        Set-Location src/app/frontend
        npm install
        npm run build
        if (Test-Path ../backend/static) { Remove-Item -Recurse -Force ../backend/static }
        Copy-Item -Recurse dist ../backend/static
